services:
  # === FastAPI Application ===
  app:
    build: .
    container_name: sentinel_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # === PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: sentinel_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_secure_pwd_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-apeiron_sentinel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel} -d ${POSTGRES_DB:-apeiron_sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === PgBouncer Connection Pooler ===
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: sentinel_pgbouncer
    restart: unless-stopped
    ports:
      - "6432:5432"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel_secure_pwd_change_me}@postgres:5432/${POSTGRES_DB:-apeiron_sentinel}
      POOL_MODE: ${PGBOUNCER_POOL_MODE:-transaction}
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-300}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-50}
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Nginx Reverse Proxy ===
  nginx:
    image: nginx:alpine
    container_name: sentinel_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy

  # === Ollama (Local AI) ===
  ollama:
    image: ollama/ollama:latest
    container_name: sentinel_ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  upload_data:
